name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1 : Build et Test Backend
  backend-build:
    runs-on: ubuntu-latest
    name: Backend - Build & Test
    
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cefiishop
          MYSQL_USER: cefiishop_user
          MYSQL_PASSWORD: cefiishop_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        working-directory: ./cefiishop
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/cefiishop?allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME: cefiishop_user
          SPRING_DATASOURCE_PASSWORD: cefiishop_pass
          SPRING_DATA_MONGODB_URI: mongodb://127.0.0.1:27017/cefiishop
        run: mvn clean package -DskipTests
      
      - name: Run Tests
        working-directory: ./cefiishop
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/cefiishop?allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME: cefiishop_user
          SPRING_DATASOURCE_PASSWORD: cefiishop_pass
          SPRING_DATA_MONGODB_URI: mongodb://127.0.0.1:27017/cefiishop
        run: mvn test
      
      - name: Upload Backend Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: cefiishop/target/cefiishop-*.jar

  # Job 2 : Build et Test Frontend
  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend - Build & Test
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cefiishop/front/package-lock.json
      
      - name: Install Dependencies
        working-directory: ./cefiishop/front
        run: npm ci
      
      - name: Build Frontend
        working-directory: ./cefiishop/front
        run: npm run build
      
      - name: Run Frontend Tests
        working-directory: ./cefiishop/front
        run: npm test -- --run
      
      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: cefiishop/front/dist

  # Job 3 : Build Docker Images (seulement sur push à main/develop)
  docker-build:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    name: Docker - Build & Push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Convert image names to lowercase
        id: image_name
        run: |
          echo "lowercase=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./cefiishop
          file: ./cefiishop/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.lowercase }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./cefiishop/front
          file: ./cefiishop/front/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image_name.outputs.lowercase }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 4 : Vérification Code Quality (optionnel - SonarQube, ESLint, etc.)
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js for ESLint
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: cefiishop/front/package-lock.json
      
      - name: Install Frontend Dependencies
        working-directory: ./cefiishop/front
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./cefiishop/front
        run: npm run lint || true
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Run Checkstyle (Backend)
        working-directory: ./cefiishop
        run: mvn checkstyle:check || true

  # Job 5 : Notification
  notify:
    needs: [backend-build, frontend-build, docker-build]
    runs-on: ubuntu-latest
    name: Notify Status
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.backend-build.result }}" == "failure" ] || [ "${{ needs.frontend-build.result }}" == "failure" ]; then
            echo "❌ Build Failed"
            exit 1
          else
            echo "✅ Build Successful"
          fi
