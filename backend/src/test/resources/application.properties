# Disable OpenAI auto-configuration in tests to avoid requiring real API keys
# Disable Spring AI auto-configs (OpenAI + Chat) in tests to avoid requiring real API keys/models
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration,org.springframework.ai.autoconfigure.chat.ChatAutoConfiguration
# Provide a placeholder API key in case some auto-config checks for presence
spring.ai.openai.api-key=placeholder
