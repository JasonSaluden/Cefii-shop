services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cefiishop
      MYSQL_USER: cefiishop_user
      MYSQL_PASSWORD: cefiishop_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - .:/app
      - maven_cache:/root/.m2
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cefiishop?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: cefiishop_user
      SPRING_DATASOURCE_PASSWORD: cefiishop_pass
      SPRING_DATA_MONGODB_URI: ${MONGODB_ATLAS_URI}
      SPRING_AI_OPENAI_BASE_URL: https://api.groq.com/openai
      SPRING_AI_OPENAI_API_KEY: ${GROQ_API_KEY}
      SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: llama-3.1-8b-instant
      SPRING_AI_VECTORSTORE_MONGODB_URI: ${MONGODB_ATLAS_URI}
      GROQ_API_KEY: ${GROQ_API_KEY}
    command: mvn spring-boot:run

volumes:
  db_data:
  maven_cache:

networks:
  default:
    enable_ipv6: true
